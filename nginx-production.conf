# /etc/nginx/sites-available/mail-app.conf
# Production Nginx Configuration

server {
    listen 80;
    listen [::]:80;
    server_name ms.kuzeysemiz.com www.ms.kuzeysemiz.com;

    # Logging
    access_log /var/log/nginx/mail-app-access.log;
    error_log /var/log/nginx/mail-app-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Client upload size limit
    client_max_body_size 50M;

    # Backend API proxy — /api/ istekleri doğrudan backend'e
    location /api/ {
        proxy_pass http://localhost:10001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend proxy — geri kalanı frontend container'a
    location / {
        proxy_pass http://localhost:10000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Gizli dosyalara erişimi engelle
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mail_api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=10001
      - GMAIL_EMAIL=${GMAIL_EMAIL}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
    ports:
      - "10001:10001"
    volumes:
      - ./backend/mail_scheduler.db:/app/mail_scheduler.db
      - ./backend/logs:/app/logs
    networks:
      - mail_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://api:10001/api
    container_name: mail_web
    restart: always
    ports:
      - "10000:10000"
    depends_on:
      - api
    networks:
      - mail_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mail_network:
    driver: bridge

volumes:
  db_data:
    driver: local
  logs_data:
    driver: local

name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source files
        run: |
          echo "Commit: ${{ github.sha }}"
          grep -c "formatDate" frontend/src/components/EmailManager.js && echo "✅ formatDate VAR" || echo "❌ formatDate YOK"
          grep -c "sendOverdue" frontend/src/components/EmailManager.js && echo "✅ sendOverdue VAR" || echo "❌ sendOverdue YOK"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/kuzeysemiz/mail-app-api:latest

      - name: Build React app
        run: |
          cd frontend
          npm ci
          CI=false REACT_APP_API_URL=/api npm run build
          grep -rl "formatDate" build/ && echo "✅ formatDate build'de VAR" || echo "❌ formatDate build'de YOK"

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.ci
          push: true
          tags: ghcr.io/kuzeysemiz/mail-app-web:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GMAIL_EMAIL,GMAIL_PASSWORD
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u kuzeysemiz --password-stdin
            docker pull ghcr.io/kuzeysemiz/mail-app-api:latest
            docker pull ghcr.io/kuzeysemiz/mail-app-web:latest
            docker logout ghcr.io
            docker stop mail_api mail_web 2>/dev/null || true
            docker rm mail_api mail_web 2>/dev/null || true
            docker network create mail_network 2>/dev/null || true
            mkdir -p ~/mail-data ~/mail-logs
            printf "NODE_ENV=production\nPORT=10001\nGMAIL_EMAIL=%s\nGMAIL_PASSWORD=%s\n" "$GMAIL_EMAIL" "$GMAIL_PASSWORD" > ~/mail.env
            chmod 600 ~/mail.env
            docker run -d --name mail_api --restart always \
              --network mail_network \
              --network-alias api \
              -p 10001:10001 \
              -v ~/mail-data:/app/data \
              -v ~/mail-logs:/app/logs \
              --env-file ~/mail.env \
              ghcr.io/kuzeysemiz/mail-app-api:latest
            docker run -d --name mail_web --restart always \
              --network mail_network \
              -p 10000:10000 \
              ghcr.io/kuzeysemiz/mail-app-web:latest
            sleep 5
            docker ps
            echo "--- mail_web logs ---"
            docker logs mail_web --tail 20
            echo "--- mail_api logs ---"
            docker logs mail_api --tail 20
            echo "✅ Deploy tamamlandı!"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
